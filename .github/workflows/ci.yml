name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-typecheck:
    name: Build & typecheck
    runs-on: ubuntu-latest
    # These NEXT_PUBLIC_* vars must be present at build time or `next build`
    # fails. The app reads Supabase lazily at request time (not during the
    # build), so harmless PLACEHOLDER values are enough for the build to
    # succeed — no real secrets are needed in CI. Real values live in Vercel.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_PUBLIC_APP_URL: https://www.punched.me
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  e2e-prod-smoke:
    name: E2E prod smoke
    runs-on: ubuntu-latest
    # Only run after the build/typecheck gate passes.
    needs: build-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      # Hits live production (https://punched.me) per playwright.config.ci.ts.
      # No secrets needed — tests are read-only, unauthenticated navigations.
      - name: Run Playwright smoke tests against prod
        run: npx playwright test --config playwright.config.ci.ts

      - name: Upload failure traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          # The CI config writes traces/screenshots here on failure (it uses the
          # list + json reporters, not the html report).
          path: test-results/
          retention-days: 7
