name: Heartbeat

# Free, self-contained uptime monitor. Pings the production health endpoint on
# a schedule; if prod is down (or the DB check fails) it opens — or comments on
# an existing — GitHub issue so the failure reaches you via GitHub notifications.
# When prod recovers, it auto-closes the issue.
#
# Caveats vs an external monitor: minimum interval is ~5 min and it runs on
# GitHub's infra, so it can't report on a GitHub-wide outage. Good enough as a
# free first line of defense; add an external watcher (UptimeRobot) later for an
# independent vantage point.

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes
  workflow_dispatch: {} # allow manual "run now" from the Actions tab

permissions:
  issues: write

env:
  HEALTH_URL: https://www.punched.me/api/health
  ISSUE_TITLE: "🔴 Production heartbeat failing"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Probe production health endpoint
        id: probe
        run: |
          # Two attempts ~15s apart to ride out a single transient blip and
          # avoid alert flapping. Capture HTTP status + body for the report.
          ok=false
          for attempt in 1 2; do
            code=$(curl -sS -o /tmp/body.txt -w "%{http_code}" --max-time 20 "$HEALTH_URL" || echo "000")
            echo "Attempt $attempt: HTTP $code"
            if [ "$code" = "200" ]; then ok=true; break; fi
            sleep 15
          done
          {
            echo "ok=$ok"
            echo "code=$code"
          } >> "$GITHUB_OUTPUT"
          {
            echo "body<<EOF"
            cat /tmp/body.txt 2>/dev/null || true
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open or update alert issue on failure
        if: steps.probe.outputs.ok == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const title = process.env.ISSUE_TITLE;
            const code = `${{ steps.probe.outputs.code }}`;
            const body = `${{ steps.probe.outputs.body }}`;
            const when = new Date().toISOString();
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const detail = [
              `**${process.env.HEALTH_URL}** did not return 200.`,
              ``,
              `- HTTP status: \`${code}\``,
              `- Checked at: ${when}`,
              `- Workflow run: ${runUrl}`,
              ``,
              `<details><summary>Response body</summary>`,
              ``,
              "```",
              body.trim() || "(empty)",
              "```",
              `</details>`,
            ].join("\n");

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "heartbeat",
            });
            const open = existing.data.find((i) => i.title === title);

            if (open) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.number,
                body: `Still failing as of ${when}.\n\n${detail}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ["heartbeat"],
                body: detail,
              });
            }

      - name: Auto-close alert issue on recovery
        if: steps.probe.outputs.ok == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = process.env.ISSUE_TITLE;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "heartbeat",
            });
            const open = existing.data.find((i) => i.title === title);
            if (open) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.number,
                body: `✅ Recovered — health endpoint returned 200 at ${new Date().toISOString()}. Closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.number,
                state: "closed",
              });
            }
